version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    command: ["npm", "run", "dev"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
      - NODE_ENV=development

  backend:
    command: ["uvicorn", "app.main:app", "--reload", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./backend:/app
    environment:
      - WATCHFILES_FORCE_POLLING=true

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  worker:
    command: ["python", "-m", "arq", "app.worker.settings.WorkerSettings", "--watch", "app"]
    volumes:
      - ./backend:/app
    environment:
      - WATCHFILES_FORCE_POLLING=true
